<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Trails | PathFinder Ontario</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

</head>
<body>

    <header class="site-header">
        <div class="logo">
            <img src="images/logo.gif" alt="PathFinder Ontario Logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="trails.html">Find Trails</a></li>
                <li><a href="weather.html">Weather</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="gallery-container">
        <aside class="filter-bar">
            <h1>Filter Trails</h1>
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="trailSearch" class="search-trails" placeholder="Search trails...">
            </div>
            
            <div class="difficulty-filters">
                <p style="margin:3% 0"><strong>Difficulty</strong></p>
                <label><input type="checkbox" class="type-check" value="Easy"> Easy</label>
                <label><input type="checkbox" class="type-check" value="Moderate"> Moderate</label>
                <label><input type="checkbox" class="type-check" value="Hard"> Hard</label>
            </div>

            <button id="mobileFilterBtn" class="mobile-only">Show Filters</button>
        </aside>

        <section id="trail-list" class="trail-cards"></section>
    </main>

    <div id="trailModal" class="modal" aria-hidden="true" role="dialog">
        <div class="modal-content">
            <button id="closeModal" aria-label="Close Modal"></button>
            <div id="modalBody">
                </div>
        </div>
    </div>
</body>

<script src="script.js"></script>

</html>
